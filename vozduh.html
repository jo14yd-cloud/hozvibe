<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Освежители воздуха</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#6a1b9a;
    color:white;
    text-align:center;
    padding:20px;
}

.back{
    display:inline-block;
    margin:20px;
    padding:10px 15px;
    background:#6a1b9a;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    padding:20px;
}

.product{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    transition:0.2s;
}

.product:hover{
    transform: translateY(-3px);
}

.product img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
    background:#ddd;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:#6a1b9a;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#4a148c;
}
</style>
</head>

<body>

<header>
    <h1>🌬️ Освежители воздуха</h1>
</header>

<a href="index.html" class="back">← Назад</a>

<div class="products">

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Glade автоматический">
        <h3>Glade автоматический</h3>
        <p class="price">950 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Air Wick спрей">
        <h3>Air Wick спрей</h3>
        <p class="price">450 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Glade сменный блок">
        <h3>Glade сменный блок</h3>
        <p class="price">600 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Ambi Pur гель">
        <h3>Ambi Pur гель</h3>
        <p class="price">700 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Освежитель ваниль">
        <h3>Освежитель (ваниль)</h3>
        <p class="price">350 сом</p>
        <button>Купить</button>
    </div>

</div>

</body>
</html>
