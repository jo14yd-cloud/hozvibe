<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Средства для туалета</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#1565c0;
    color:white;
    text-align:center;
    padding:20px;
}

.back{
    display:inline-block;
    margin:20px;
    padding:10px 15px;
    background:#1565c0;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    padding:20px;
}

.product{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    transition:0.2s;
}

.product:hover{
    transform: translateY(-3px);
}

.product img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
    background:#ddd;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

button{
    background:#1565c0;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#0d47a1;
}
</style>
</head>

<body>

<header>
    <h1>🚽 Средства для туалета</h1>
</header>

<a href="index.html" class="back">← Назад</a>

<div class="products">

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Domestos">
        <h3>Domestos гель</h3>
        <p class="price">500 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Bref">
        <h3>Bref блок для унитаза</h3>
        <p class="price">350 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Туалетный ершик">
        <h3>Ершик для унитаза</h3>
        <p class="price">250 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Чистящее средство">
        <h3>Чистящее средство</h3>
        <p class="price">450 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Освежитель туалета">
        <h3>Освежитель воздуха</h3>
        <p class="price">300 сом</p>
        <button>Купить</button>
    </div>

</div>

</body>
</html>
