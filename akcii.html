<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Акции и скидки</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background: linear-gradient(90deg, #d32f2f, #f57c00);
    color:white;
    text-align:center;
    padding:20px;
}

.back{
    display:inline-block;
    margin:20px;
    padding:10px 15px;
    background:#d32f2f;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.banner{
    background:white;
    margin:20px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.discount{
    font-size:28px;
    font-weight:bold;
    color:#d32f2f;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
    padding:20px;
}

.product{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    transition:0.2s;
}

.product:hover{
    transform: translateY(-3px);
}

.product img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
    background:#ddd;
}

.price{
    color:green;
    font-size:18px;
    font-weight:bold;
    margin:10px 0;
}

.old-price{
    text-decoration: line-through;
    color:gray;
    font-size:14px;
}

button{
    background:#d32f2f;
    color:white;
    border:none;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#b71c1c;
}
</style>
</head>

<body>

<header>
    <h1>🔥 Акции и скидки</h1>
</header>

<a href="index.html" class="back">← Назад</a>

<div class="banner">
    <div class="discount">Скидки до 50%</div>
    <p>Товары для дома по сниженным ценам</p>
</div>

<div class="products">

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Кастрюля">
        <h3>Кастрюля 3 л</h3>
        <p class="old-price">1200 сом</p>
        <p class="price">850 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Domestos">
        <h3>Domestos гель</h3>
        <p class="old-price">500 сом</p>
        <p class="price">350 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Перчатки">
        <h3>Перчатки хозяйственные</h3>
        <p class="old-price">150 сом</p>
        <p class="price">100 сом</p>
        <button>Купить</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/300x200" alt="Освежитель">
        <h3>Освежитель воздуха</h3>
        <p class="old-price">400 сом</p>
        <p class="price">250 сом</p>
        <button>Купить</button>
    </div>

</div>

</body>
</html>
